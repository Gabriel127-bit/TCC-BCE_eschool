<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>BCE School</title>
</head>
<body>
    <div style="display: flex; height: 100vh; align-items: center; position: fixed; left: 0; top: 0; width: 100%;">
        <div style="width: 30%;">
        <img class="img-login" src="../imgs/Frame 1.png" alt="">
    </div>

        <div class="form-login">
            <h1 class="titulo">Login</h1>
            <form action="" method="POST" class="form-container">
                <div class="input-container">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" class="input-login" required>
                </div>

                <div class="input-container">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" class="input-login" required>
                </div>
                <button type="submit" class="button-login">Entrar</button>
            </form>
            
            <h3 class="cadastro-text">
                Não tem uma conta? <a href="cadastro.html" class="link-cadastro">Cadastre-se</a>
            </h3>
        </div>

    </div>

</body>
</html>
